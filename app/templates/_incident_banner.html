{% if incident %}
<aside class="incident-banner" aria-label="Latest incident">
  <div><strong>{{ incident.spoken_headline }}</strong><p>{{ incident.briefing }}</p></div>
  <div class="incident-actions">
    {% if incident.audio_path %}
    <audio controls preload="none" aria-label="Play voice briefing" src="{{ incident.audio_path }}"></audio>
    {% endif %}
    <a href="/incidents/latest">Review incident</a>
  </div>
</aside>
{% endif %}
