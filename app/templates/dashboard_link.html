<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Open Production Flow</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: transparent;
        display: flex;
        gap: 12px;
        margin: 0;
        min-height: 56px;
        padding: 8px 12px;
      }

      p {
        color: #6b7280;
        font-size: 13px;
        margin: 0;
      }

      a {
        background: #632ca6;
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 12px;
        text-decoration: none;
        white-space: nowrap;
      }

      a:focus-visible,
      a:hover {
        background: #4c1d95;
        outline: 2px solid #a78bfa;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <p>If attention is above zero, work the oldest overdue stage first.</p>
    <a href="/dashboard#queue" target="_blank" rel="noopener noreferrer">Open Production Flow ↗</a>
  </body>
</html>
