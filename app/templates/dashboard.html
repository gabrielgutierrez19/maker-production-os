<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopfloor</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body>
    <header><h1>Shopfloor</h1><p>Production queue</p></header>
    {% if incident %}
    <aside class="incident-banner" aria-label="Latest incident">
      <div>
        <strong>{{ incident.spoken_headline }}</strong>
        <p>{{ incident.briefing }}</p>
      </div>
      <a href="/incidents/latest">Review incident</a>
    </aside>
    {% endif %}
    {% include "board.html" %}
  </body>
</html>
